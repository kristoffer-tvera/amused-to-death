<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guild Interview Checklist</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #121212;
        color: #f1f1f1;
        padding: 30px;
      }

      .section-card {
        background-color: #1e1e1e;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 25px;
      }

      .clock-container {
        text-align: center;
        margin-bottom: 40px;
      }

      #clock {
        font-size: 5rem;
        font-weight: bold;
        letter-spacing: 3px;
      }

      .section-title {
        margin-bottom: 20px;
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
      }

      .form-check {
        margin-bottom: 12px;
      }

      .form-check-input {
        transform: scale(1.3);
        margin-right: 10px;
      }

      .form-check-label {
        font-size: 1.05rem;
      }

      .completed {
        text-decoration: line-through;
        opacity: 0.6;
      }

      .progress {
        height: 30px;
        margin-bottom: 30px;
      }

      .sticky-topbar {
        position: sticky;
        top: 0;
        z-index: 1000;
        background-color: #121212;
        padding-top: 15px;
        padding-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sticky-topbar">
        <div class="clock-container">
          <div id="clock">00:00:00</div>
        </div>

        <div class="progress">
          <div
            id="progressBar"
            class="progress-bar progress-bar-striped progress-bar-animated"
            role="progressbar"
            style="width: 0%"
          >
            0%
          </div>
        </div>
      </div>

      <!-- SECTION 1 -->
      <div class="section-card">
        <h2 class="section-title">1. Intro</h2>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="intro1"
          />
          <label class="form-check-label" for="intro1"
            >Quick guild history</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="intro2"
          />
          <label class="form-check-label" for="intro2"
            >Current progression</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="intro3"
          />
          <label class="form-check-label" for="intro3">Raid schedule</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="intro4"
          />
          <label class="form-check-label" for="intro4"
            >Current recruitment need</label
          >
        </div>
      </div>

      <!-- SECTION 2 -->
      <div class="section-card">
        <h2 class="section-title">2. Guild Philosophy</h2>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="phil1"
          />
          <label class="form-check-label" for="phil1"
            >Long-term stability</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="phil2"
          />
          <label class="form-check-label" for="phil2">Reliability</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="phil3"
          />
          <label class="form-check-label" for="phil3">Personality fit</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="phil4"
          />
          <label class="form-check-label" for="phil4">Preparation</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="phil5"
          />
          <label class="form-check-label" for="phil5">Community mindset</label>
        </div>
      </div>

      <!-- SECTION 3 -->
      <div class="section-card">
        <h2 class="section-title">3. Operational Expectations</h2>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="ops1"
          />
          <label class="form-check-label" for="ops1">Attendance</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="ops2"
          />
          <label class="form-check-label" for="ops2">Split raids</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="ops4"
          />
          <label class="form-check-label" for="ops4">M+ expectation</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="ops5"
          />
          <label class="form-check-label" for="ops5">Loot council</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="ops6"
          />
          <label class="form-check-label" for="ops6">Trial process</label>
        </div>
      </div>

      <!-- SECTION 4 -->
      <div class="section-card">
        <h2 class="section-title">4. Candidate Section</h2>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="cand1"
          />
          <label class="form-check-label" for="cand1"
            >Why leaving current guild?</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="cand2"
          />
          <label class="form-check-label" for="cand2"
            >What kind of environment are you looking for?</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="cand3"
          />
          <label class="form-check-label" for="cand3"
            >Attendance concerns?</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="cand4"
          />
          <label class="form-check-label" for="cand4"
            >Preferred role/class flexibility?</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="cand5"
          />
          <label class="form-check-label" for="cand5"
            >How do you prep for progression?</label
          >
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="cand6"
          />
          <label class="form-check-label" for="cand6"
            >What do you think your weaknesses are?</label
          >
        </div>
      </div>

      <!-- SECTION 5 -->
      <div class="section-card">
        <h2 class="section-title">5. Wrap-Up</h2>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="wrap1"
          />
          <label class="form-check-label" for="wrap1">Explain next steps</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="wrap2"
          />
          <label class="form-check-label" for="wrap2">Timeline</label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input checklist-item"
            type="checkbox"
            id="wrap3"
          />
          <label class="form-check-label" for="wrap3">Questions</label>
        </div>
      </div>
    </div>

    <script>
      // CLOCK
      function updateClock() {
        const now = new Date();

        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        const seconds = String(now.getSeconds()).padStart(2, "0");

        document.getElementById("clock").textContent =
          `${hours}:${minutes}:${seconds}`;
      }

      setInterval(updateClock, 1000);
      updateClock();

      // CHECKLIST + PROGRESS BAR
      const checkboxes = document.querySelectorAll(".checklist-item");
      const progressBar = document.getElementById("progressBar");

      function updateProgress() {
        let checked = 0;

        checkboxes.forEach((box) => {
          const label = document.querySelector(`label[for="${box.id}"]`);

          if (box.checked) {
            checked++;
            label.classList.add("completed");
          } else {
            label.classList.remove("completed");
          }
        });

        const percent = Math.round((checked / checkboxes.length) * 100);

        progressBar.style.width = percent + "%";
        progressBar.textContent = percent + "%";
      }

      checkboxes.forEach((box) => {
        box.addEventListener("change", updateProgress);
      });

      updateProgress();
    </script>
  </body>
</html>
