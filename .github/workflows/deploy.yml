name: Deploy

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: npm ci

            - name: Build frontend
              working-directory: frontend
              run: npm run build

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  extensions: mysqli

            - name: Lint backend PHP
              run: find backend -name '*.php' ! -name 'secrets.php' -print0 | xargs -0 -n1 php -l

            - name: Populate backend secrets
              if: github.event_name == 'push'
              run: 'echo "$PHP_SECRET" > ./backend/secrets.php'
              shell: bash
              env:
                  PHP_SECRET: ${{ secrets.PHP }}

            - name: Prepare deploy artifact
              if: github.event_name == 'push'
              run: |
                  mkdir -p deploy
                  cp -R backend deploy/backend
                  cp -R frontend/dist/. deploy/

            - name: Deploy over FTP
              if: github.event_name == 'push'
              uses: SamKirkland/FTP-Deploy-Action@v4.3.4
              with:
                  server: 134.209.176.222
                  username: webroot
                  password: ${{ secrets.FTP_PASSWORD }}
                  local-dir: ./deploy/
                  server-dir: ./www.amusedtodeath.eu/
