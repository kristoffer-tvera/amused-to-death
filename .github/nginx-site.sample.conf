# Sample nginx site config for amusedtodeath.eu.
# Copy into /etc/nginx/sites-available/amusedtodeath.eu, adjust paths and PHP-FPM socket,
# then symlink into /etc/nginx/sites-enabled/.

server {
    listen 80;
    listen [::]:80;
    server_name amusedtodeath.eu www.amusedtodeath.eu;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name amusedtodeath.eu www.amusedtodeath.eu;

    root /var/www/www.amusedtodeath.eu;
    index index.html;

    # Configure these for your certificate provider, for example Certbot/Let's Encrypt.
    ssl_certificate /etc/letsencrypt/live/amusedtodeath.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amusedtodeath.eu/privkey.pem;

    # React/Vite SPA: serve real files first, then fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP backend endpoints are called with explicit .php filenames.
    location ^~ /backend/ {
        try_files $uri =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Do not expose local/deployment secrets directly.
    location ~ ^/backend/secrets\.php$ {
        deny all;
    }

    # Optional static cache for built Vite assets and frontend public files.
    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
